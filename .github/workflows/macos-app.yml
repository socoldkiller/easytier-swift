name: macOS App

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

concurrency:
  group: macos-app-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build EasyTier.app
    runs-on: macos-14
    timeout-minutes: 90
    permissions:
      contents: read
    env:
      EASYTIER_BUILD_CONFIGURATION: release
      EASYTIER_BUILD_NUMBER: ${{ github.run_number }}
      EASYTIER_EXPORT_APP_DIR: ${{ github.workspace }}/.build/artifacts/EasyTier.app

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install native build dependencies
        run: brew install protobuf

      - name: Select Xcode 16
        run: |
          XCODE_APP="$(python3 - <<'PY'
          import glob
          import os
          import re

          def version(path):
              match = re.search(r'Xcode_(\d+(?:\.\d+)*)\.app$', path)
              if not match:
                  return ()
              return tuple(int(part) for part in match.group(1).split('.'))

          candidates = glob.glob('/Applications/Xcode_16*.app')
          if candidates:
              print(max(candidates, key=version))
          elif os.path.isdir('/Applications/Xcode.app'):
              print('/Applications/Xcode.app')
          PY
          )"
          if [[ -z "$XCODE_APP" ]]; then
            echo "Xcode 16 is required but was not found." >&2
            exit 1
          fi
          sudo xcode-select -s "$XCODE_APP/Contents/Developer"
          xcodebuild -version
          swift --version

      - name: Bootstrap toolchain
        run: ./scripts/bootstrap.sh

      - name: Build EasyTier FFI
        run: ./scripts/build-ffi.sh

      - name: Test Swift package
        run: swift test --configuration release

      - name: Import Developer ID certificate
        if: startsWith(github.ref, 'refs/tags/')
        env:
          APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64 }}
          APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD }}
          APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        run: |
          if [[ -z "$APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64" || -z "$APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD" || -z "$APPLE_KEYCHAIN_PASSWORD" ]]; then
            echo "Developer ID certificate secrets are required for tag releases." >&2
            exit 1
          fi

          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id-application.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/easytier-signing.keychain-db"

          printf '%s' "$APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$APPLE_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$APPLE_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed 's/[" ]//g')
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$APPLE_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Package app
        env:
          EASYTIER_CODESIGN_IDENTITY: ${{ secrets.APPLE_CODESIGN_IDENTITY }}
        run: |
          mkdir -p .build/artifacts
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            export EASYTIER_REQUIRE_DISTRIBUTION_SIGNING=1
          else
            export EASYTIER_LOCAL_SIGNING_DIR="$RUNNER_TEMP/EasyTierLocalSigning"
            export EASYTIER_EXPORT_CODESIGN_CERT_PATH="$GITHUB_WORKSPACE/.build/artifacts/EasyTierLocalCodeSigning.cer"
          fi
          ./scripts/package-app.sh

      - name: Verify app bundle
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            export EASYTIER_VERIFY_INSTALLABLE_HELPER=1
          fi
          ./scripts/verify-app.sh "$EASYTIER_EXPORT_APP_DIR"

      - name: Notarize release app
        if: startsWith(github.ref, 'refs/tags/')
        env:
          APPLE_NOTARY_KEY: ${{ secrets.APPLE_NOTARY_KEY }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
        run: |
          if [[ -z "$APPLE_NOTARY_KEY" || -z "$APPLE_NOTARY_KEY_ID" || -z "$APPLE_NOTARY_ISSUER_ID" ]]; then
            echo "Apple notarization secrets are required for tag releases." >&2
            exit 1
          fi

          mkdir -p .build/artifacts "$RUNNER_TEMP/notary"
          NOTARY_KEY_PATH="$RUNNER_TEMP/notary/AuthKey_${APPLE_NOTARY_KEY_ID}.p8"
          NOTARY_ZIP_PATH="$RUNNER_TEMP/EasyTier-notary.zip"
          printf '%s' "$APPLE_NOTARY_KEY" > "$NOTARY_KEY_PATH"
          ditto -c -k --keepParent --sequesterRsrc --zlibCompressionLevel 9 \
            "$EASYTIER_EXPORT_APP_DIR" \
            "$NOTARY_ZIP_PATH"
          xcrun notarytool submit "$NOTARY_ZIP_PATH" \
            --key "$NOTARY_KEY_PATH" \
            --key-id "$APPLE_NOTARY_KEY_ID" \
            --issuer "$APPLE_NOTARY_ISSUER_ID" \
            --wait
          xcrun stapler staple "$EASYTIER_EXPORT_APP_DIR"
          spctl -a -vvv -t exec "$EASYTIER_EXPORT_APP_DIR"

      - name: Archive app
        run: |
          mkdir -p .build/artifacts
          ditto -c -k --keepParent --sequesterRsrc --zlibCompressionLevel 9 \
            "$EASYTIER_EXPORT_APP_DIR" \
            ".build/artifacts/EasyTier-macOS-${{ runner.arch }}.app.zip"
          if [[ -f .build/artifacts/EasyTierLocalCodeSigning.cer ]]; then
            cat > .build/artifacts/SELF_SIGNED_INSTALL.txt <<'EOF'
          EasyTier self-signed developer-mode build

          This artifact is not Developer ID signed or Apple notarized.

          To try the privileged helper on macOS:
          1. Import EasyTierLocalCodeSigning.cer into Keychain Access.
          2. Set the certificate to Always Trust for Code Signing.
          3. Open EasyTier.app with Control-click > Open, or use Privacy & Security > Open Anyway if macOS blocks first launch.
          4. In EasyTier, click Install Helper.
          5. If macOS asks, allow EasyTier in System Settings > General > Login Items & Extensions.

          Do not use this self-signed build as a production release.
          EOF
          fi

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: EasyTier-macOS-${{ runner.arch }}
          path: .build/artifacts/*
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download app artifact
        uses: actions/download-artifact@v4
        with:
          pattern: EasyTier-macOS-*
          path: .build/release-artifacts
          merge-multiple: true

      - name: Publish GitHub Release asset
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          gh release view "$TAG_NAME" --repo "$REPOSITORY" >/dev/null 2>&1 || \
            gh release create "$TAG_NAME" --repo "$REPOSITORY" --title "$TAG_NAME" --notes "Automated EasyTier macOS app build."
          gh release upload "$TAG_NAME" .build/release-artifacts/*.zip --repo "$REPOSITORY" --clobber
