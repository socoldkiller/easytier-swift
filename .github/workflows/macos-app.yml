name: macOS App

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:
    inputs:
      runner:
        description: "Runner to use for manual builds"
        required: true
        default: "github-hosted"
        type: choice
        options:
          - github-hosted
          - self-hosted

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

concurrency:
  group: macos-app-${{ github.event_name == 'push' && github.sha || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build EasyTier.app
    runs-on: ${{ ((github.event_name == 'workflow_dispatch' && inputs.runner == 'self-hosted') || github.event_name == 'push') && 'easytier-macos' || 'macos-14' }}
    timeout-minutes: 90
    permissions:
      contents: read
    env:
      EASYTIER_BUILD_CONFIGURATION: release
      EASYTIER_EXPORT_APP_DIR: ${{ github.workspace }}/.build/artifacts/EasyTier.app

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install native build dependencies
        run: brew install protobuf

      - name: Select Xcode 16
        env:
          EASYTIER_RUNNER_KIND: ${{ ((github.event_name == 'workflow_dispatch' && inputs.runner == 'self-hosted') || github.event_name == 'push') && 'self-hosted' || 'github-hosted' }}
        run: |
          XCODE_APP="$(python3 - <<'PY'
          import glob
          import os
          import re

          def version(path):
              match = re.search(r'Xcode_(\d+(?:\.\d+)*)\.app$', path)
              if not match:
                  return ()
              return tuple(int(part) for part in match.group(1).split('.'))

          candidates = glob.glob('/Applications/Xcode_16*.app')
          if candidates:
              print(max(candidates, key=version))
          elif os.path.isdir('/Applications/Xcode.app'):
              print('/Applications/Xcode.app')
          PY
          )"
          if [[ -z "$XCODE_APP" ]]; then
            echo "Xcode 16 is required but was not found." >&2
            exit 1
          fi
          TARGET_DEVELOPER_DIR="$XCODE_APP/Contents/Developer"
          CURRENT_DEVELOPER_DIR="$(xcode-select -p 2>/dev/null || true)"
          if [[ "$CURRENT_DEVELOPER_DIR" != "$TARGET_DEVELOPER_DIR" ]]; then
            if [[ "$EASYTIER_RUNNER_KIND" == "self-hosted" ]] && ! sudo -n true 2>/dev/null; then
              cat >&2 <<EOF
          Self-hosted runner must select Xcode before running this workflow:

            sudo xcode-select -s "$TARGET_DEVELOPER_DIR"

          EOF
              exit 1
            fi
            sudo xcode-select -s "$TARGET_DEVELOPER_DIR"
          fi
          xcodebuild -version
          swift --version

      - name: Bootstrap toolchain
        run: ./scripts/bootstrap.sh

      - name: Build EasyTier FFI
        run: ./scripts/build-ffi.sh

      - name: Test Swift package
        run: swift test --configuration release

      - name: Resolve macOS signing mode
        id: signing
        env:
          APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64 }}
          APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD }}
          APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
          APPLE_CODESIGN_IDENTITY: ${{ secrets.APPLE_CODESIGN_IDENTITY }}
          APPLE_NOTARY_KEY: ${{ secrets.APPLE_NOTARY_KEY }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
        run: |
          if [[ "$GITHUB_REF" != refs/tags/* ]]; then
            echo "mode=local" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          missing=()
          for name in \
            APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64 \
            APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD \
            APPLE_KEYCHAIN_PASSWORD \
            APPLE_CODESIGN_IDENTITY \
            APPLE_NOTARY_KEY \
            APPLE_NOTARY_KEY_ID \
            APPLE_NOTARY_ISSUER_ID
          do
            if [[ -z "${!name}" ]]; then
              missing+=("$name")
            fi
          done

          if [[ "${#missing[@]}" -eq 0 ]]; then
            echo "mode=developer-id" >> "$GITHUB_OUTPUT"
            echo "Tag release will use Developer ID signing and Apple notarization."
          else
            echo "mode=self-signed" >> "$GITHUB_OUTPUT"
            printf 'Apple release secrets are not fully configured; publishing a self-signed, non-notarized DMG. Missing: %s\n' "${missing[*]}"
          fi

      - name: Import Developer ID certificate
        if: startsWith(github.ref, 'refs/tags/') && steps.signing.outputs.mode == 'developer-id'
        uses: Apple-Actions/import-codesign-certs@v7
        with:
          p12-file-base64: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD }}
          keychain-password: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}

      - name: Package app
        env:
          EASYTIER_CODESIGN_IDENTITY: ${{ secrets.APPLE_CODESIGN_IDENTITY }}
          EASYTIER_SIGNING_MODE: ${{ steps.signing.outputs.mode }}
        run: |
          mkdir -p .build/artifacts
          if [[ "$EASYTIER_SIGNING_MODE" == "developer-id" ]]; then
            export EASYTIER_REQUIRE_DISTRIBUTION_SIGNING=1
          else
            export EASYTIER_CODESIGN_IDENTITY="-"
            export EASYTIER_LOCAL_SIGNING_DIR="$RUNNER_TEMP/EasyTierLocalSigning"
            export EASYTIER_EXPORT_CODESIGN_CERT_PATH="$GITHUB_WORKSPACE/.build/artifacts/EasyTierLocalCodeSigning.cer"
          fi
          ./scripts/package-app.sh

      - name: Verify app bundle
        env:
          EASYTIER_SIGNING_MODE: ${{ steps.signing.outputs.mode }}
        run: |
          if [[ "$EASYTIER_SIGNING_MODE" == "developer-id" ]]; then
            export EASYTIER_VERIFY_INSTALLABLE_HELPER=1
          fi
          ./scripts/verify-app.sh "$EASYTIER_EXPORT_APP_DIR"

      - name: Notarize release app
        if: startsWith(github.ref, 'refs/tags/') && steps.signing.outputs.mode == 'developer-id'
        env:
          APPLE_NOTARY_KEY: ${{ secrets.APPLE_NOTARY_KEY }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
        run: |
          if [[ -z "$APPLE_NOTARY_KEY" || -z "$APPLE_NOTARY_KEY_ID" || -z "$APPLE_NOTARY_ISSUER_ID" ]]; then
            echo "Apple notarization secrets are required for tag releases." >&2
            exit 1
          fi

          mkdir -p .build/artifacts "$RUNNER_TEMP/notary"
          NOTARY_KEY_PATH="$RUNNER_TEMP/notary/AuthKey_${APPLE_NOTARY_KEY_ID}.p8"
          NOTARY_ZIP_PATH="$RUNNER_TEMP/EasyTier-notary.zip"
          printf '%s' "$APPLE_NOTARY_KEY" > "$NOTARY_KEY_PATH"
          ditto -c -k --keepParent --sequesterRsrc --zlibCompressionLevel 9 \
            "$EASYTIER_EXPORT_APP_DIR" \
            "$NOTARY_ZIP_PATH"
          xcrun notarytool submit "$NOTARY_ZIP_PATH" \
            --key "$NOTARY_KEY_PATH" \
            --key-id "$APPLE_NOTARY_KEY_ID" \
            --issuer "$APPLE_NOTARY_ISSUER_ID" \
            --wait
          xcrun stapler staple "$EASYTIER_EXPORT_APP_DIR"
          spctl -a -vvv -t exec "$EASYTIER_EXPORT_APP_DIR"

      - name: Archive app
        run: |
          mkdir -p .build/artifacts
          INSTALL_NOTES_PATH=".build/artifacts/SELF_SIGNED_INSTALL.txt"
          if [[ -f .build/artifacts/EasyTierLocalCodeSigning.cer ]]; then
            cat > "$INSTALL_NOTES_PATH" <<'EOF'
          EasyTier self-signed developer-mode build

          This artifact is not Developer ID signed or Apple notarized.

          To try the privileged helper on macOS:
          1. Import and trust EasyTierLocalCodeSigning.cer for Code Signing.
          2. Quit EasyTier if it is running.
          3. When replacing another self-signed test build, run `sfltool resetbtm` to clear stale ServiceManagement records.
          4. Open EasyTier-macOS-*.dmg and drag EasyTier.app to Applications.
          5. Run `xattr -cr ~/Applications/EasyTier.app` if macOS copied quarantine attributes.
          6. Open EasyTier.app from Applications with Control-click > Open, or use Privacy & Security > Open Anyway if macOS blocks first launch.
          7. In EasyTier, click Install Helper.
          8. If macOS asks, allow EasyTier in System Settings > General > Login Items & Extensions.

          Do not use this self-signed build as a production release.
          EOF
          else
            INSTALL_NOTES_PATH=""
          fi

          EASYTIER_DMG_CODESIGN_CERT_PATH=".build/artifacts/EasyTierLocalCodeSigning.cer" \
          EASYTIER_DMG_INSTALL_NOTES_PATH="$INSTALL_NOTES_PATH" \
            ./scripts/create-dmg.sh \
              "$EASYTIER_EXPORT_APP_DIR" \
              ".build/artifacts/EasyTier-macOS-${{ runner.arch }}.dmg"

          BUNDLE_SHORT_VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$EASYTIER_EXPORT_APP_DIR/Contents/Info.plist")"
          BUNDLE_VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$EASYTIER_EXPORT_APP_DIR/Contents/Info.plist")"
          cat > ".build/artifacts/EasyTier-macOS-${{ runner.arch }}.metadata.json" <<EOF
          {
            "architecture": "${{ runner.arch }}",
            "version": "$BUNDLE_SHORT_VERSION",
            "build": "$BUNDLE_VERSION"
          }
          EOF

          # Only upload the installable archive and helper files. Uploading the
          # loose .app directory makes artifact installs ambiguous and can leave
          # ServiceManagement records pointing at the Downloads extraction path.
          rm -rf "$EASYTIER_EXPORT_APP_DIR"

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: EasyTier-macOS-${{ runner.arch }}
          path: .build/artifacts/*
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: easytier-macos
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download app artifact
        uses: actions/download-artifact@v4
        with:
          pattern: EasyTier-macOS-*
          path: .build/release-artifacts
          merge-multiple: true

      - name: Ensure GitHub CLI
        run: |
          if ! command -v gh >/dev/null 2>&1; then
            brew install gh
          fi

      - name: Publish GitHub Release asset
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          NOTES_PATH=".build/release-artifacts/RELEASE_NOTES.md"
          if [[ -f .build/release-artifacts/SELF_SIGNED_INSTALL.txt ]]; then
            cat > "$NOTES_PATH" <<'EOF'
          Automated EasyTier macOS app build.

          This DMG is self-signed and not Apple-notarized because Apple Developer ID/notarization credentials are not configured for CI. macOS Gatekeeper may block first launch.

          See SELF_SIGNED_INSTALL.txt inside the DMG for installation notes.
          EOF
          else
            cat > "$NOTES_PATH" <<'EOF'
          Automated EasyTier macOS app build.

          This DMG is Developer ID signed and Apple-notarized.
          EOF
          fi

          gh release view "$TAG_NAME" --repo "$REPOSITORY" >/dev/null 2>&1 || \
            gh release create "$TAG_NAME" --repo "$REPOSITORY" --title "$TAG_NAME" --notes-file "$NOTES_PATH"
          gh release edit "$TAG_NAME" --repo "$REPOSITORY" --notes-file "$NOTES_PATH"
          gh release upload "$TAG_NAME" .build/release-artifacts/*.dmg --repo "$REPOSITORY" --clobber

      - name: Generate update feed
        env:
          TAG_NAME: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          mkdir -p .build/pages
          python3 - <<'PY'
          import glob
          import hashlib
          import json
          import os
          import pathlib
          import sys

          tag = os.environ["TAG_NAME"]
          repository = os.environ["REPOSITORY"]
          tag_version = tag[1:] if tag.startswith(("v", "V")) else tag
          metadata_versions = []
          metadata_builds = []
          for metadata_path in sorted(glob.glob(".build/release-artifacts/*.metadata.json")):
              with open(metadata_path, "r", encoding="utf-8") as handle:
                  metadata = json.load(handle)
              if metadata.get("version"):
                  metadata_versions.append(str(metadata["version"]))
              if metadata.get("build"):
                  metadata_builds.append(str(metadata["build"]))
          version = metadata_versions[0] if metadata_versions else tag_version
          if any(item != version for item in metadata_versions):
              print(f"Release artifacts disagree on version: {metadata_versions}", file=sys.stderr)
              sys.exit(1)
          build = max(metadata_builds, key=lambda item: int(item) if item.isdigit() else 0) if metadata_builds else "0"
          arch_names = {
              "ARM64": "arm64",
              "arm64": "arm64",
              "X64": "x86_64",
              "x64": "x86_64",
              "x86_64": "x86_64",
          }
          assets = {}
          for path in sorted(glob.glob(".build/release-artifacts/*.dmg")):
              file_path = pathlib.Path(path)
              arch_token = file_path.stem.split("-")[-1]
              arch = arch_names.get(arch_token, arch_token)
              hasher = hashlib.sha256()
              with file_path.open("rb") as handle:
                  for chunk in iter(lambda: handle.read(1024 * 1024), b""):
                      hasher.update(chunk)
              assets[arch] = {
                  "url": f"https://github.com/{repository}/releases/download/{tag}/{file_path.name}",
                  "sha256": hasher.hexdigest(),
                  "size": file_path.stat().st_size,
              }

          if not assets:
              print("No DMG assets found for update feed.", file=sys.stderr)
              sys.exit(1)

          manifest = {
              "schemaVersion": 1,
              "channel": "stable",
              "version": version,
              "build": build,
              "tag": tag,
              "minimumSystemVersion": "14.0",
              "releaseNotesURL": f"https://github.com/{repository}/releases/tag/{tag}",
              "assets": assets,
          }
          with open(".build/pages/update.json", "w", encoding="utf-8") as handle:
              json.dump(manifest, handle, indent=2, sort_keys=True)
              handle.write("\n")
          PY

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload update feed page artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: .build/pages

      - name: Deploy update feed to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
